name: Tests

on:
  push:
    branches: [ main, develop ]
  # Run on every PR regardless of its base branch, so a stacked PR (one based on
  # another feature branch, not main/develop) still gets CI. Push CI stays scoped to
  # the long-lived branches above.
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24', '1.25']

    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install goyacc
      # goyacc@latest tracks x/tools, whose module now requires a newer Go than the
      # test matrix builds with; setup-go v6+ exports GOTOOLCHAIN=local, which blocks
      # the automatic toolchain switch. Override to auto for this build-tool install
      # only -- the parser generator may build with a newer Go; the tests below still
      # run on the matrix Go under the inherited GOTOOLCHAIN=local.
      env:
        GOTOOLCHAIN: auto
      run: go install golang.org/x/tools/cmd/goyacc@latest

    - name: Generate parser
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        goyacc -o parser/y.go -p yy parser/classad.y

    - name: Download dependencies
      run: go mod download

    - name: Build
      run: go build -v ./...

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      if: matrix.go-version == '1.23'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  # collections/ is a separate Go module (its own go.mod, go 1.25) — the dense
  # ClassAd store + query engine, the persistent/archive variants, and their tests.
  # The root module's `go test ./...` does not descend into a nested module, so it
  # gets its own job (and a newer toolchain than the root matrix).
  collections:
    name: Collections module
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: '1.25'

    - name: Install goyacc
      # goyacc@latest tracks x/tools, whose module now requires a newer Go than the
      # test matrix builds with; setup-go v6+ exports GOTOOLCHAIN=local, which blocks
      # the automatic toolchain switch. Override to auto for this build-tool install
      # only -- the parser generator may build with a newer Go; the tests below still
      # run on the matrix Go under the inherited GOTOOLCHAIN=local.
      env:
        GOTOOLCHAIN: auto
      run: go install golang.org/x/tools/cmd/goyacc@latest

    - name: Generate parser
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        goyacc -o parser/y.go -p yy parser/classad.y

    - name: Build and vet
      working-directory: collections
      run: |
        go mod download
        go build ./...
        go vet ./...

    # Tests parallelize via t.Parallel(), so the suite scales across the runner's
    # cores; the race detector's ~5-10x memory is bounded because the few heaviest
    # tests are sized to a few thousand ads. ~7min on a 12-core box.
    - name: Test (race detector)
      working-directory: collections
      run: go test -race -count=1 -timeout 25m ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: '1.23'

    - name: Install goyacc
      # goyacc@latest tracks x/tools, whose module now requires a newer Go than the
      # test matrix builds with; setup-go v6+ exports GOTOOLCHAIN=local, which blocks
      # the automatic toolchain switch. Override to auto for this build-tool install
      # only -- the parser generator may build with a newer Go; the tests below still
      # run on the matrix Go under the inherited GOTOOLCHAIN=local.
      env:
        GOTOOLCHAIN: auto
      run: go install golang.org/x/tools/cmd/goyacc@latest

    - name: Generate parser
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        goyacc -o parser/y.go -p yy parser/classad.y

    - name: Run go vet
      run: go vet ./...

    - name: Run go fmt
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Go code is not formatted:"
          gofmt -s -d .
          exit 1
        fi

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
      with:
        version: latest
        skip-cache: true
