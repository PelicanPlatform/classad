name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']

    steps:
    - name: Check out code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install goyacc
      run: go install golang.org/x/tools/cmd/goyacc@latest

    - name: Generate parser
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        goyacc -o parser/y.go -p yy parser/classad.y

    - name: Download dependencies
      run: go mod download

    - name: Build
      run: go build -v ./...

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      if: matrix.go-version == '1.23'
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  # collections/ is a separate Go module (its own go.mod, go 1.25) — the dense
  # ClassAd store + query engine, the persistent/archive variants, and their tests.
  # The root module's `go test ./...` does not descend into a nested module, so it
  # gets its own job (and a newer toolchain than the root matrix).
  collections:
    name: Collections module
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.25'

    - name: Install goyacc
      run: go install golang.org/x/tools/cmd/goyacc@latest

    - name: Generate parser
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        goyacc -o parser/y.go -p yy parser/classad.y

    - name: Build and vet
      working-directory: collections
      run: |
        go mod download
        go build ./...
        go vet ./...

    # Tests parallelize via t.Parallel(), so the suite scales across the runner's
    # cores; the race detector's ~5-10x memory is bounded because the few heaviest
    # tests are sized to a few thousand ads. ~7min on a 12-core box.
    - name: Test (race detector)
      working-directory: collections
      run: go test -race -count=1 -timeout 25m ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.23'

    - name: Install goyacc
      run: go install golang.org/x/tools/cmd/goyacc@latest

    - name: Generate parser
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        goyacc -o parser/y.go -p yy parser/classad.y

    - name: Run go vet
      run: go vet ./...

    - name: Run go fmt
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Go code is not formatted:"
          gofmt -s -d .
          exit 1
        fi

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.1
      with:
        version: latest
        skip-cache: true
